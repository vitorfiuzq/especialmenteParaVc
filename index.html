<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="assets/index.css">

<body class="login-state">

<canvas id="petalas"></canvas>

<!-- LOGIN -->
<div class="tela-login" id="login">
    <div class="livro-lombada"></div>
    <div class="livro-capa" id="livroCapa">
        <div class="cadeado" id="cadeado">
            <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg" width="80" height="100">
                <!-- ARCO -->
                <path d="M25 55 Q25 15 50 15 Q75 15 75 55" fill="none" stroke="#8b0000" stroke-width="8" stroke-linecap="round"/>
                <!-- CORPO -->
                <rect x="15" y="52" width="70" height="60" rx="8" ry="8" fill="#1a0000" stroke="#8b0000" stroke-width="2"/>
                <!-- DETALHE SUPERIOR -->
                <rect x="15" y="52" width="70" height="12" rx="4" ry="4" fill="#2a0000" stroke="#8b0000" stroke-width="1"/>
                <!-- BURACO DA FECHADURA -->
                <circle cx="50" cy="76" r="10" fill="#0a0000" stroke="#5b0000" stroke-width="1.5"/>
                <!-- BURACO INFERIOR -->
                <rect x="46" y="76" width="8" height="14" rx="3" fill="#0a0000"/>
                <!-- DETALHES LATERAIS -->
                <line x1="22" y1="70" x2="22" y2="100" stroke="#3a0000" stroke-width="1.5"/>
                <line x1="78" y1="70" x2="78" y2="100" stroke="#3a0000" stroke-width="1.5"/>
                <!-- REBITES -->
                <circle cx="22" cy="64" r="3" fill="#5b0000"/>
                <circle cx="78" cy="64" r="3" fill="#5b0000"/>
                <circle cx="22" cy="104" r="3" fill="#5b0000"/>
                <circle cx="78" cy="104" r="3" fill="#5b0000"/>
            </svg>
        </div>
        <div class="livro-titulo-login">The Programmer<br>Diaries</div>
        <div class="login-form">
            <input type="password" id="senha" placeholder="senha...">
            <button onclick="verificar()">Abrir</button>
        </div>
    </div>
</div>

<!-- LIVRO -->
<div class="livro" id="livro">

    <!-- CAPA -->
    <div class="capa">
        <h1 class="book-title">The Programmer Diaries</h1>
        <p class="subtitulo">diário totalmente dedicado a você gatinha! <br> </p>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <div class="timeline">

            <div class="entry" data-text="Comecei a escrever este diário. Ainda tudo é novo, mas sinto que isso vai crescer.">

                <div class="date">Dia 3</div>
                <div class="text"></div>
            </div>

            <div class="entry" data-text="As páginas começaram a ganhar forma. O projeto já parece vivo.">
                <div class="ponto"></div>
                <div class="date">Dia 19</div>
                <div class="text"></div>
            </div>

        </div>

    </div>
    
    <div class="paginas">
        <h2 class="paginas-titulo">Capítulos</h2>
        <div class="livro-grid">
            <a class="pagina" href="livro/capitulo1.html">

            </a>
            <a class="pagina" href="livro/capitulo2.html">

</div>
